<!DOCTYPE html>
<html lang="zh-CN" class="theme-soft">
<head>
    <meta charset="UTF-8">
    <title>雅思精听助手 v8.2 - 完整功能版</title>
    <style>
        /* --- 1. 全局变量定义 --- */
        :root {
            --primary: #1976d2;
            --q-color: #e65100;
            --bg: #f0f2f5;
            --panel-bg: #ffffff;
            --resizer: #dee2e6;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --font-family: 'PingFang SC', system-ui;
        }

        /* --- 皮肤样式 --- */
        .theme-pixel {
            --bg: #F4E1D2; --panel-bg: #FFF; --primary: #FF8B4D; --radius: 0px; --shadow: 4px 4px 0px #000; --font-family: 'Courier New', monospace;
            background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 20px 20px;
        }
        .theme-pixel .panel { border: 3px solid #000; }
        .theme-pixel .q-btn, .theme-pixel .btn-sm, .theme-pixel .download-btn { border: 2px solid #000 !important; box-shadow: 2px 2px 0 #000; }

        .theme-soft { --bg: #DAEBE3; --panel-bg: rgba(255,255,255,0.9); --primary: #99CDD8; --radius: 16px; }

        .theme-puffy { --bg: #f0f0f0; --panel-bg: #f0f0f0; --radius: 24px; --shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff; }
        .theme-puffy .panel, .theme-puffy .q-btn, .theme-puffy .audio-ctrl-group, .theme-puffy .download-btn { box-shadow: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff; border: none; }

        .theme-glass { background: linear-gradient(135deg, #99CDD8 0%, #F3C3B2 100%); --panel-bg: rgba(255, 255, 255, 0.4); --radius: 12px; --shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .theme-glass .panel { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }

        /* --- 2. 基础布局 --- */
        body { font-family: var(--font-family); margin: 0; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg); transition: all 0.3s ease; }
        .top-nav { background: var(--panel-bg); padding: 10px 20px; display: flex; gap: 15px; box-shadow: var(--shadow); align-items: center; z-index: 100; backdrop-filter: blur(10px); }
        .nav-section { display: flex; align-items: center; gap: 8px; padding-right: 15px; border-right: 1px solid rgba(0,0,0,0.1); }
        .skin-select { padding: 5px 10px; border-radius: 20px; border: 1px solid var(--primary); background: white; cursor: pointer; font-size: 12px; }
        .main-container { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 0; }
        .panel { background: var(--panel-bg); display: flex; flex-direction: column; overflow: hidden; border-radius: var(--radius); transition: all 0.3s ease; box-shadow: var(--shadow); }
        .panel-header { background: rgba(0,0,0,0.03); padding: 8px 12px; font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #qNavPanel { width: 180px; flex-shrink: 0; }
        #lyricsView { flex: 1; min-width: 300px; margin: 0 10px; }
        #pdfPanel { width: 40%; flex-shrink: 0; }
        .audio-ctrl-group { padding: 15px; background: rgba(255,255,255,0.2); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .ctrl-row { display: flex; align-items: center; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
        .btn-sm { padding: 4px 8px; font-size: 11px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); background: white; border-radius: var(--radius); }
        .btn-sm.active { background: var(--primary); color: white; }
        #lyrics-container { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .line { padding: 12px; margin-bottom: 8px; border-radius: var(--radius); cursor: pointer; border-left: 4px solid transparent; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.3); transition: 0.2s; }
        .line.active { background: var(--panel-bg); border-left-color: var(--primary); transform: scale(1.02); box-shadow: var(--shadow); }
        .q-btn { padding: 8px; background: #fff3e0; color: var(--q-color); border: none; border-radius: var(--radius); text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; }
        
        /* 下载按钮样式 */
        .download-btn { font-size: 10px; padding: 4px 8px; background: #4caf50; color: white; border: none; border-radius: var(--radius); cursor: pointer; font-weight: bold; white-space: nowrap; margin-left: 10px; transition: 0.2s; }
        .download-btn:hover { opacity: 0.8; }

        #pdf-frame { width: 100%; height: 100%; border: none; border-radius: var(--radius); }
        .resizer { width: 8px; cursor: col-resize; flex-shrink: 0; z-index: 10; }
        #drag-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; cursor: col-resize; }
        .collapsed { width: 45px !important; }
        .collapsed *:not(.fold-btn, .panel-header) { display: none; }
        #status-info { font-size: 11px; color: var(--primary); font-weight: bold; margin-left: auto; }
        .q-indicator { color: var(--q-color); font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body class="theme-soft">

<div id="drag-overlay"></div>

<div class="top-nav">
    <div class="nav-section">
        <strong>雅思听力 Sync v8.2 / Jiselle</strong>
        <select class="skin-select" onchange="changeTheme(this.value)">
            <option value="theme-soft">🌸 柔和</option>
            <option value="theme-pixel">🎮 像素</option>
            <option value="theme-puffy">☁️ 粘土</option>
            <option value="theme-glass">🧊 玻璃</option>
        </select>
    </div>

    <div class="nav-section">
        <span style="font-size:12px;">📚 课程库:</span>
        <select id="cloudLibrary" onchange="loadFromLibrary(this.value)" style="padding:4px; font-size:11px; max-width:120px;">
            <option value="">-- 同步中 --</option>
        </select>
    </div>

    <!-- 加回手动上传区域 -->
    <div class="nav-section" style="border:none; gap:10px;">
        <span style="font-size:12px;">上传音频:</span>
        <input type="file" id="mediaUpload" accept="audio/*" style="width:100px;">
        <span style="font-size:12px; margin-left:5px;">上传教案:</span>
        <input type="file" id="textUpload" accept=".srt" style="width:100px;">
    </div>
    
    <div id="status-info">就绪</div>
</div>

<div class="main-container" id="mainContainer">
    <div class="panel" id="qNavPanel">
        <div class="panel-header">
            <span class="header-title">题目列表</span>
            <button class="fold-btn" onclick="toggleFold('qNavPanel')">◀</button>
        </div>
        <div class="q-nav-body" id="qNavBody" style="padding:10px; display:flex; flex-direction:column; gap:8px;"></div>
    </div>
    <div class="resizer" id="resizer1"></div>
    <div class="panel" id="lyricsView">
        <div class="audio-ctrl-group">
            <audio id="audioPlayer" controls style="width: 100%;"></audio>
            <div class="ctrl-row">
                <button class="btn-sm" onclick="changeTime(-3)">-3s</button>
                <button class="btn-sm" onclick="changeTime(3)">+3s</button>
                <span style="margin-left:10px; font-size:11px;">倍速:</span>
                <button class="speed-btn btn-sm" onclick="setSpeed(0.5, this)">0.5</button>
                <button class="speed-btn btn-sm" onclick="setSpeed(0.75, this)">0.75</button>
                <button class="speed-btn btn-sm active" onclick="setSpeed(1, this)">原速</button>
                <button class="speed-btn btn-sm" onclick="setSpeed(1.25, this)">1.25</button>
                <button class="speed-btn btn-sm" onclick="setSpeed(1.5, this)">1.5</button>
            </div>
        </div>
        <div id="lyrics-container"><div id="lyrics-content"></div></div>
    </div>
    <div class="resizer" id="resizer2"></div>
    <div class="panel" id="pdfPanel">
        <div class="panel-header">
            <button class="fold-btn" onclick="toggleFold('pdfPanel')">▶</button>
            <span class="header-title">真题</span>
        </div>
        <div style="flex:1; background:#525659;">
            <iframe id="pdf-frame" style="display:none;"></iframe>
            <div id="pdf-placeholder" style="color:white; text-align:center; padding-top:50px;">等待 PDF...</div>
        </div>
    </div>
</div>

<script>
    const GITHUB_USER = "itsjiselle";
    const GITHUB_REPO = "ielts-listening-questions-pdf";
    const BASE_URL = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/`;
    const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;

    let lyricsData = [], audioBuffer = null, currentFileName = "";
    const audioPlayer = document.getElementById('audioPlayer');
    const pdfFrame = document.getElementById('pdf-frame');
    const statusInfo = document.getElementById('status-info');
    const librarySelect = document.getElementById('cloudLibrary');

    function changeTheme(themeName) { document.body.className = themeName; }

    async function refreshLibrary() {
        try {
            const res = await fetch(`${API_URL}?t=${Date.now()}`);
            const files = await res.json();
            const mp3Files = files.filter(f => f.name.toLowerCase().endsWith('.mp3'));
            librarySelect.innerHTML = '<option value="">-- 选择已入库真题 --</option>';
            mp3Files.forEach(f => {
                let opt = document.createElement('option');
                opt.value = f.name; opt.innerText = f.name.replace(/\.[^/.]+$/, "");
                librarySelect.appendChild(opt);
            });
            statusInfo.innerText = "库同步完成";
        } catch (err) { statusInfo.innerText = "同步失败"; }
    }

    async function loadFromLibrary(file) {
        if (!file) return;
        currentFileName = file.replace(/\.[^/.]+$/, "");
        const url = `${BASE_URL}${file}`;
        audioPlayer.src = url;
        fetchAudioToBuffer(url);
        pdfFrame.style.display = 'block';
        document.getElementById('pdf-placeholder').style.display = 'none';
        pdfFrame.src = `${BASE_URL}${currentFileName}.pdf#toolbar=1&view=FitH`;
        autoLoadSRT(currentFileName);
    }

    async function fetchAudioToBuffer(url) {
        try {
            const res = await fetch(url);
            const arrayBuffer = await res.arrayBuffer();
            audioBuffer = await new AudioContext().decodeAudioData(arrayBuffer);
            statusInfo.innerText = "音频已缓冲";
        } catch (e) { statusInfo.innerText = "缓冲失败"; }
    }

    // 处理音频上传
    document.getElementById('mediaUpload').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name.replace(/\.[^/.]+$/, "");
        audioPlayer.src = URL.createObjectURL(file);
        const arrayBuffer = await file.arrayBuffer();
        audioBuffer = await new AudioContext().decodeAudioData(arrayBuffer);
        pdfFrame.style.display = 'block';
        document.getElementById('pdf-placeholder').style.display = 'none';
        pdfFrame.src = `${BASE_URL}${currentFileName}.pdf#toolbar=1&view=FitH`;
        autoLoadSRT(currentFileName);
    };

    // 【加回】手动处理教案上传逻辑
    document.getElementById('textUpload').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            parseSRT(event.target.result);
            statusInfo.innerText = "已手动加载教案";
        };
        reader.readAsText(file);
    };

    async function autoLoadSRT(id) {
        try {
            const res = await fetch(`${API_URL}?t=${Date.now()}`);
            const files = await res.json();
            const matched = files.find(f => f.name.includes(id) && f.name.toLowerCase().endsWith('.srt'));
            if (matched) {
                const srtRes = await fetch(matched.download_url);
                parseSRT(await srtRes.text());
            }
        } catch (err) {}
    }

    function parseSRT(text) {
        lyricsData = [];
        const qBody = document.getElementById('qNavBody');
        qBody.innerHTML = '';
        text.replace(/\r\n/g, '\n').split(/\n\s*\n/).forEach(block => {
            const lines = block.trim().split('\n');
            const timeMatch = lines[1]?.match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
            if (timeMatch) {
                const time = parseInt(timeMatch[1]) * 3600 + parseInt(timeMatch[2]) * 60 + parseInt(timeMatch[3]) + parseInt(timeMatch[4]) / 1000;
                let content = lines.slice(2).join(' ');
                let qNum = content.match(/\(Q(.*?)\)/)?.[1] || null;
                lyricsData.push({ time, content, q: qNum });
                if (qNum) {
                    let btn = document.createElement('div');
                    btn.className = 'q-btn'; btn.innerText = `Q ${qNum}`;
                    btn.onclick = () => { audioPlayer.currentTime = time; audioPlayer.play(); };
                    qBody.appendChild(btn);
                }
            }
        });
        render();
    }

    function render() {
        const container = document.getElementById('lyrics-content');
        container.innerHTML = '';
        lyricsData.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = `line ${item.q ? 'is-q' : ''}`;
            div.id = `line-${i}`;
            div.innerHTML = `
                <div style="flex:1">
                    ${item.q ? `<span class="q-indicator">[Q${item.q}]</span>` : ''}
                    <span>${item.content}</span>
                </div>
                ${item.q ? `<button class="download-btn" onclick="downloadFullQuestion(${i}, event)">下载音频</button>` : ''}
            `;
            div.onclick = () => { audioPlayer.currentTime = item.time; audioPlayer.play(); };
            container.appendChild(div);
        });
    }

    async function downloadFullQuestion(startIndex, event) {
        event.stopPropagation();
        if (!audioBuffer) return alert("音频缓冲未完成，请稍候");
        const qRaw = lyricsData[startIndex].q.replace(/[\\/:*?"<>|]/g, "_"); 
        const startTime = lyricsData[startIndex].time;
        let endTime = audioBuffer.duration;
        for (let j = startIndex + 1; j < lyricsData.length; j++) { if (lyricsData[j].q) { endTime = lyricsData[j].time; break; } }
        const audioCtx = new AudioContext();
        const newBuffer = audioCtx.createBuffer(audioBuffer.numberOfChannels, Math.floor((endTime - startTime) * audioBuffer.sampleRate), audioBuffer.sampleRate);
        for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) { newBuffer.getChannelData(ch).set(audioBuffer.getChannelData(ch).slice(Math.floor(startTime * audioBuffer.sampleRate), Math.floor(endTime * audioBuffer.sampleRate))); }
        const a = document.createElement('a'); a.href = URL.createObjectURL(bufferToWav(newBuffer)); a.download = `${currentFileName} Q${qRaw}.wav`; a.click();
    }

    function bufferToWav(buffer) {
        const length = buffer.length * 2 + 44; const view = new DataView(new ArrayBuffer(length)); const sampleRate = buffer.sampleRate; const channels = buffer.numberOfChannels; let offset = 0;
        const writeString = (s) => { for (let i = 0; i < s.length; i++) view.setUint8(offset++, s.charCodeAt(i)); };
        writeString('RIFF'); view.setUint32(offset, length - 8, true); offset += 4; writeString('WAVE'); writeString('fmt '); view.setUint32(offset, 16, true); offset += 4; view.setUint16(offset, 1, true); offset += 2; view.setUint16(offset, channels, true); offset += 2; view.setUint32(offset, sampleRate, true); offset += 4; view.setUint32(offset, sampleRate * channels * 2, true); offset += 4; view.setUint16(offset, channels * 2, true); offset += 2; view.setUint16(offset, 16, true); offset += 2; writeString('data'); view.setUint32(offset, length - offset - 4, true); offset += 4;
        for (let i = 0; i < buffer.length; i++) { for (let ch = 0; ch < channels; ch++) { let s = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i])); view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true); offset += 2; } }
        return new Blob([view], { type: 'audio/wav' });
    }

    function changeTime(sec) { audioPlayer.currentTime += sec; }
    function setSpeed(rate, btn) {
        audioPlayer.playbackRate = rate;
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    const initResizer = () => {
        const res1 = document.getElementById('resizer1'), res2 = document.getElementById('resizer2');
        const qP = document.getElementById('qNavPanel'), pdfP = document.getElementById('pdfPanel');
        const overlay = document.getElementById('drag-overlay');
        const startDrag = (resizer, panel, isLeft) => {
            resizer.onmousedown = (e) => {
                overlay.style.display = 'block';
                const startX = e.clientX, startW = panel.offsetWidth;
                document.onmousemove = (me) => {
                    let w = isLeft ? (startW + (me.clientX - startX)) : (startW - (me.clientX - startX));
                    if (w > 40 && w < window.innerWidth * 0.8) panel.style.width = w + 'px';
                };
                document.onmouseup = () => { overlay.style.display = 'none'; document.onmousemove = null; };
            };
        };
        startDrag(res1, qP, true); startDrag(res2, pdfP, false);
    };

    function toggleFold(id) {
        const p = document.getElementById(id); p.classList.toggle('collapsed');
        if(!p.classList.contains('collapsed')) p.style.width = (id==='qNavPanel'?'180px':'40%');
    }

    audioPlayer.ontimeupdate = () => {
        const cur = audioPlayer.currentTime;
        for (let i = 0; i < lyricsData.length; i++) {
            if (cur >= lyricsData[i].time && (!lyricsData[i+1] || cur < lyricsData[i+1].time)) {
                const el = document.getElementById(`line-${i}`);
                if (el && !el.classList.contains('active')) {
                    document.querySelectorAll('.line.active').forEach(x => x.classList.remove('active'));
                    el.classList.add('active');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                break;
            }
        }
    };

    window.onload = () => { refreshLibrary(); initResizer(); };
</script>
</body>
</html>
